name: Untrusted CI LF

on:
  pull_request:
  merge_group:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------------
      # Checkout
      # ---------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: "recursive"
          fetch-depth: 0

      # ---------------------------------------------------------
      # Accept NDK license
      # ---------------------------------------------------------
      - name: Accept NDK license
        run: echo "y" | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "ndk;29.0.13113456"

      # ---------------------------------------------------------
      # Build
      # ---------------------------------------------------------
      - name: Build
        run: |
          make release -j$(nproc)
          make debug -j$(nproc)

      # ---------------------------------------------------------
      # Detect release ZIP
      # ---------------------------------------------------------
      - name: Detect release ZIP
        id: rel
        run: |
          shopt -s nullglob
          files=(build/out/ReZygisk-v*-release.zip)
          if (( ${#files[@]} == 0 )); then
            echo "No release zip found"
            exit 1
          fi
          zip_path="${files[0]}"
          echo "zip_path=$zip_path" >> $GITHUB_OUTPUT
          echo "zip_name=$(basename "$zip_path")" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------
      # Detect debug ZIP
      # ---------------------------------------------------------
      - name: Detect debug ZIP
        id: dbg
        run: |
          shopt -s nullglob
          files=(build/out/ReZygisk-v*-debug.zip)
          if (( ${#files[@]} == 0 )); then
            echo "No debug zip found"
            exit 1
          fi
          zip_path="${files[0]}"
          echo "zip_path=$zip_path" >> $GITHUB_OUTPUT
          echo "zip_name=$(basename "$zip_path")" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------
      # Upload artifacts
      # ---------------------------------------------------------
      - name: Upload release
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.rel.outputs.zip_name }}
          path: ${{ steps.rel.outputs.zip_path }}
          archive: false

      - name: Upload debug
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.dbg.outputs.zip_name }}
          path: ${{ steps.dbg.outputs.zip_path }}
          archive: false

      # ---------------------------------------------------------
      # Create GitHub Release (only for workflow_dispatch)
      # ---------------------------------------------------------
      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.PAT_CLASSIC }}
          tag_name: untrusted-${{ github.run_number }}
          name: Untrusted Build ${{ github.run_number }}
          body: |
            Automated Untrusted CI build.
            Commit: ${{ github.sha }}
          files: |
            ${{ steps.rel.outputs.zip_path }}
            ${{ steps.dbg.outputs.zip_path }}

      # ---------------------------------------------------------
      # Generate simple changelog
      # ---------------------------------------------------------
      - name: Generate changelog
        id: changelog
        run: |
          git log -n 30 --pretty=format:"• %s" > CHANGELOG.txt
          ESCAPED=$(sed ':a;N;$!ba;s/\n/%0A/g' CHANGELOG.txt)
          echo "escaped=$ESCAPED" >> $GITHUB_OUTPUT

      # ---------------------------------------------------------
      # Telegram: message (only for workflow_dispatch)
      # ---------------------------------------------------------
      - name: Send Telegram message
        if: github.event_name == 'workflow_dispatch'
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          CHANGELOG_ESC: ${{ steps.changelog.outputs.escaped }}
        run: |
          TEXT="🧪 Untrusted CI Build #${{ github.run_number }}%0ACommit: <code>${{ github.sha }}</code>%0A%0A<b>Changelog:</b>%0A${CHANGELOG_ESC}"

          curl -v -X POST \
            "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="$TEXT"

      # ---------------------------------------------------------
      # Telegram: ZIP files (only for workflow_dispatch)
      # ---------------------------------------------------------
      - name: Send ZIP files
        if: github.event_name == 'workflow_dispatch'
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          curl -v -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TG_CHAT_ID}" \
            -F document=@"${{ steps.rel.outputs.zip_path }}"

          curl -v -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TG_CHAT_ID}" \
            -F document=@"${{ steps.dbg.outputs.zip_path }}"
